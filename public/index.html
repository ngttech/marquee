<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquee — Rooms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Bebas+Neue&family=Black+Ops+One&family=Teko:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }

.page {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px 20px;
}
.banner {
  display: flex; align-items: center; justify-content: center;
  padding: 14px 40px 11px;
  border-bottom: 1px solid #c9a84c;
  background: linear-gradient(135deg,#1a1200,#0d0a00,#1a1200);
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
}
.banner-text {
  font-family: 'Cinzel', serif; font-size: clamp(16px,2.2vw,28px);
  font-weight: 700; letter-spacing: clamp(6px,1vw,14px);
  text-transform: uppercase; color: #c9a84c;
  text-shadow: 0 0 20px rgba(201,168,76,0.4);
  white-space: nowrap;
}
.banner-orn { color: #c9a84c; opacity: 0.6; margin: 0 16px; font-size: 14px; letter-spacing: 3px; }
.settings-link {
  position: absolute; right: 20px; color: rgba(255,255,255,0.35);
  text-decoration: none; font-size: 20px; transition: color 0.2s;
  line-height: 1;
}
.settings-link:hover { color: #c9a84c; }

h2 {
  font-family: 'Cinzel', serif; font-size: clamp(14px,1.5vw,20px);
  font-weight: 600; letter-spacing: 6px; text-transform: uppercase;
  color: rgba(255,255,255,0.35); margin-bottom: 32px;
}
.rooms { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
.room-card {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding: 32px 48px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  text-decoration: none; color: #fff;
  transition: all 0.3s;
}
.room-card:hover {
  border-color: rgba(201,168,76,0.4);
  background: rgba(201,168,76,0.05);
}
.room-name {
  font-family: 'Cinzel', serif; font-size: clamp(16px,2vw,24px);
  font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
}
.room-mode {
  font-size: 12px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; color: rgba(255,255,255,0.3);
}
.room-title {
  font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 1px;
}
.theme-indicator {
  width: 8px; height: 8px; border-radius: 50; display: inline-block;
  border-radius: 50%; margin-right: 8px; vertical-align: middle;
}
</style>
</head>
<body>
<div class="banner">
  <span class="banner-orn">✦ ── ✦</span>
  <span class="banner-text">Marquee</span>
  <span class="banner-orn">✦ ── ✦</span>
  <a href="/settings" class="settings-link" title="Settings">⚙</a>
</div>
<div class="page">
  <h2>Select a Room</h2>
  <div class="rooms" id="rooms">
    <div class="room-card"><div class="room-mode">Loading...</div></div>
  </div>
</div>
<script>
const THEME_COLORS = {
  default: '#c9a84c', christmas: '#d4373e', halloween: '#ff8c00',
  ocean: '#00b4d8', royal: '#9b5de5', emerald: '#2ec4b6', rose: '#e8628c',
};

(async () => {
  try {
    const res = await fetch('/api/rooms');
    const rooms = await res.json();
    const container = document.getElementById('rooms');
    container.innerHTML = rooms.map(r => {
      const themeColor = THEME_COLORS[r.theme] || THEME_COLORS.default;
      return `
        <a href="/room/${r.slug}" class="room-card">
          <div class="room-name">
            <span class="theme-indicator" style="background:${themeColor}"></span>${r.name || r.slug.replace(/-/g, ' ')}
          </div>
          <div class="room-mode">${r.mode}</div>
          ${r.title ? `<div class="room-title">${r.title}</div>` : ''}
        </a>
      `;
    }).join('');
  } catch (err) {
    document.getElementById('rooms').innerHTML = '<div class="room-mode">Failed to load rooms</div>';
  }
})();
</script>
</body>
</html>
