<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquee — Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Bebas+Neue&family=Black+Ops+One&family=Teko:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.youtube.com/iframe_api"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #000; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
body.cursor-hidden { cursor: none; }
:root {
  --b-color: #c9a84c;
  --b-glow: rgba(201,168,76,0.4);
  --b-bg: linear-gradient(135deg,#1a1200,#0d0a00,#1a1200);
}

/* ═══ BANNER ═══ */
.banner {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  padding: 14px 40px 11px;
  border-bottom: 1px solid var(--b-color);
  background: var(--b-bg);
  overflow: hidden;
}
.banner-text {
  font-family: 'Cinzel', serif; font-size: clamp(16px,2.2vw,28px);
  font-weight: 700; letter-spacing: clamp(6px,1vw,14px);
  text-transform: uppercase; color: var(--b-color);
  text-shadow: 0 0 20px var(--b-glow);
  white-space: nowrap;
}
.banner-orn { color: var(--b-color); opacity: 0.6; margin: 0 16px; font-size: 14px; letter-spacing: 3px; }

/* ═══ NOW PLAYING ═══ */
.np-wrap {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, #0d0d0d, #000);
}
.movie-ambient {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 55% 65% at 50% 50%, color-mix(in srgb, var(--b-color) 12%, transparent), transparent 70%);
  pointer-events: none;
}
.movie-layout {
  position: absolute; top: 56px; bottom: 0; left: 0; right: 0;
  display: grid; grid-template-rows: 1fr auto;
}
.movie-poster-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 16px 0 8px;
}
.movie-poster-frame {
  position: relative; height: 100%; aspect-ratio: 2/3;
  animation: revealUp 1s cubic-bezier(0.16,1,0.3,1) both;
}
.movie-poster-frame img {
  width: 100%; height: 100%; object-fit: cover;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
  display: block;
}
.watched-eye {
  position: absolute; top: 10px; right: 10px; width: 30px; height: 30px;
  background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); z-index: 5;
}
.watched-eye svg { width: 13px; height: 13px; fill: none; stroke: var(--b-color); stroke-width: 2; }
.trailer-pill {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7); font-size: 12px;
  backdrop-filter: blur(8px); cursor: pointer;
  transition: all 0.2s; margin-top: 6px;
  animation: revealUp 0.6s 1.2s both;
}
.trailer-pill:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.4); }
.meta-bar {
  background: linear-gradient(0deg, #000, rgba(0,0,0,0.97));
  border-top: 1px solid rgba(255,255,255,0.05);
  padding: 10px 24px 14px;
  display: flex; flex-direction: column; gap: 7px;
}
.tagline {
  text-align: center; font-family: 'Rajdhani', sans-serif;
  font-size: clamp(11px,1.4vw,17px); font-weight: 400; letter-spacing: 3px;
  color: rgba(240,232,216,0.55); font-style: italic;
  animation: revealUp 0.6s 0.5s both;
}
.badges {
  display: flex; align-items: center; justify-content: center;
  gap: clamp(8px,1.5vw,22px); flex-wrap: wrap;
  animation: revealUp 0.6s 0.7s both;
}
.b-rating {
  border: 2px solid rgba(255,255,255,0.5); padding: 2px 8px;
  font-size: clamp(9px,0.9vw,12px); font-weight: 700; color: #fff;
  line-height: 1.1; font-family: 'Rajdhani', sans-serif; letter-spacing: 0.5px;
}
.b-rating small { display: block; font-size: 0.58em; color: rgba(255,255,255,0.6); letter-spacing: 0.3px; }
.b-audio { display: flex; flex-direction: column; align-items: center; gap: 0; }
.b-audio .ab { font-family: 'Bebas Neue', sans-serif; font-size: clamp(12px,1.3vw,16px); letter-spacing: 2px; line-height: 1; }
.b-audio .as { font-size: clamp(6px,0.6vw,8px); letter-spacing: 1.5px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
.atmos .ab { color: #00b4d8; }
.dtshd .ab { color: #7fb3e8; }
.truehd .ab { color: #e86b6b; }
.b-res {
  border: 1.5px solid rgba(255,255,255,0.3); padding: 2px 9px;
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(12px,1.3vw,17px);
  letter-spacing: 2px; line-height: 1; color: rgba(255,255,255,0.85);
}
.b-res.uhd { border-color: var(--b-color); color: var(--b-color); }
.b-res.hdr { border-color: #f39c12; color: #f39c12; font-size: clamp(9px,0.9vw,12px); }
.b-aspect { color: rgba(255,255,255,0.45); font-size: clamp(10px,1vw,14px); font-weight: 500; letter-spacing: 1px; }
.b-stars { display: flex; gap: 2px; }
.star { font-size: clamp(13px,1.3vw,18px); }
.s-full { color: var(--b-color); }
.s-half { color: var(--b-color); opacity: 0.55; }
.s-empty { color: rgba(255,255,255,0.18); }
.b-clock { font-family: 'Bebas Neue', sans-serif; font-size: clamp(14px,1.5vw,20px); letter-spacing: 3px; color: rgba(255,255,255,0.4); }
.divider { width: 1px; height: 24px; background: rgba(255,255,255,0.1); flex-shrink: 0; }

/* ═══ SCREENSAVER ═══ */
.ss-wrap {
  position: fixed; inset: 0;
  background: #000;
}
.ss-bg-img {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  filter: brightness(0.35) saturate(0.8);
  transform: scale(1.04);
  animation: ssKenBurns1 20s ease-in-out infinite alternate;
}
.ss-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 20%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
}
.ss-bottom-grad {
  position: absolute; bottom: 0; left: 0; right: 0; height: 70%;
  background: linear-gradient(transparent, rgba(0,0,0,0.97));
  pointer-events: none;
}
.ss-layout {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: grid; grid-template-columns: 1fr auto; gap: 30px;
  align-items: end; padding: 50px 60px;
  z-index: 5;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.ss-text-col { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
.ss-source-label {
  font-family: 'Cinzel', serif; font-size: clamp(10px,0.9vw,13px);
  font-weight: 600; letter-spacing: 8px; color: var(--b-color);
  text-shadow: 0 0 20px var(--b-glow); text-transform: uppercase;
  animation: revealUp 0.8s both;
}
.ss-title {
  font-family: 'Cinzel', serif; font-size: clamp(32px,6vw,80px);
  font-weight: 900; color: #fff; letter-spacing: 3px; line-height: 1.0;
  text-shadow: 0 4px 60px rgba(0,0,0,0.9);
  animation: revealUp 0.8s 0.1s both;
}
.ss-meta-row {
  display: flex; align-items: center; gap: 20px;
  animation: revealUp 0.8s 0.25s both;
}
.ss-year { font-family: 'Bebas Neue', sans-serif; font-size: clamp(16px,1.8vw,22px); letter-spacing: 4px; color: rgba(255,255,255,0.45); }
.ss-genre-pill {
  border: 1px solid rgba(255,255,255,0.2); padding: 3px 10px;
  font-family: 'Rajdhani', sans-serif; font-size: clamp(10px,0.9vw,13px);
  font-weight: 600; letter-spacing: 2px; color: rgba(255,255,255,0.5); text-transform: uppercase;
}
.ss-tagline {
  font-family: 'Rajdhani', sans-serif; font-size: clamp(14px,1.6vw,20px);
  font-weight: 400; color: rgba(255,255,255,0.45); font-style: italic; letter-spacing: 2px;
  animation: revealUp 0.8s 0.35s both;
}
.ss-badges {
  display: flex; align-items: center; gap: clamp(8px,1.2vw,18px); flex-wrap: wrap;
  animation: revealUp 0.8s 0.4s both;
}
.ss-runtime {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(14px,1.4vw,18px);
  letter-spacing: 3px; color: rgba(255,255,255,0.4);
}
.ss-overview {
  font-family: 'Rajdhani', sans-serif; font-size: clamp(12px,1.2vw,16px);
  font-weight: 400; color: rgba(255,255,255,0.35); letter-spacing: 1px; line-height: 1.4;
  max-width: 100%;
  animation: revealUp 0.8s 0.5s both;
}
.ss-credits {
  font-family: 'Rajdhani', sans-serif; font-size: clamp(11px,1vw,14px);
  font-weight: 500; color: rgba(255,255,255,0.3); letter-spacing: 2px;
  animation: revealUp 0.8s 0.55s both;
}
.ss-poster-col {
  padding-bottom: 4px;
  animation: revealUp 1s 0.2s both;
}
.ss-poster-img {
  height: clamp(160px,22vh,280px); aspect-ratio: 2/3; object-fit: cover;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}
.ss-progress-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: rgba(255,255,255,0.05);
}
.ss-progress-fill {
  height: 100%; background: var(--b-color); opacity: 0.5; width: 35%;
  animation: ssProgress 15s linear infinite;
}
.ss-dot-nav {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 6;
}
.ss-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.3s; }
.ss-dot.active { background: var(--b-color); width: 20px; border-radius: 3px; }
.banner-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; top: auto; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  padding: 14px 40px 11px;
  border-top: 1px solid var(--b-color); border-bottom: none;
  background: var(--b-bg);
  overflow: hidden;
}
.banner-bottom .banner-text,
.banner-bottom .banner-orn { color: var(--b-color); }
.banner-bottom .banner-text { text-shadow: 0 0 20px var(--b-glow); }
.ss-dot-nav.has-bottom-banner { bottom: 68px; }
.ss-progress-bar.has-bottom-banner { bottom: 52px; }
.ss-poster-view {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 5; background: #000;
}
.ss-poster-view.has-top-banner { top: 56px; }
.ss-poster-view.has-bottom-banner { bottom: 52px; }
.ss-poster-view-img {
  max-height: 100%; max-width: 100%; aspect-ratio: 2/3; object-fit: cover;
  animation: revealUp 1s cubic-bezier(0.16,1,0.3,1) both;
}

/* ═══ NOW PLAYING TV ═══ */
.tv-layout {
  position: absolute; top: 56px; bottom: 0; left: 0; right: 0;
  display: grid; grid-template-columns: auto 1fr; gap: 0;
  padding: 24px 40px 20px;
}
.tv-poster-col {
  display: flex; align-items: center; justify-content: center;
  padding-right: 36px;
}
.tv-poster-img {
  height: clamp(280px, 50vh, 520px); aspect-ratio: 2/3; object-fit: cover;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
  animation: revealUp 1s cubic-bezier(0.16,1,0.3,1) both;
}
.tv-info-col {
  display: flex; flex-direction: column; justify-content: center; gap: 14px;
  overflow: hidden;
  animation: revealUp 0.8s 0.2s both;
}
.tv-show-title {
  font-family: 'Cinzel', serif; font-size: clamp(28px,4vw,52px);
  font-weight: 900; color: #fff; letter-spacing: 2px; line-height: 1.1;
  text-shadow: 0 4px 40px rgba(0,0,0,0.8);
}
.tv-badge-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.tv-badge {
  border: 1px solid rgba(255,255,255,0.2); padding: 3px 10px;
  font-family: 'Rajdhani', sans-serif; font-size: clamp(11px,1vw,14px);
  font-weight: 600; letter-spacing: 2px; color: rgba(255,255,255,0.6); text-transform: uppercase;
}
.tv-badge.accent { border-color: var(--b-color); color: var(--b-color); }
.tv-episode-title {
  font-family: 'Rajdhani', sans-serif; font-size: clamp(18px,2.4vw,32px);
  font-weight: 500; color: rgba(255,255,255,0.75); letter-spacing: 1px;
}
.tv-overview {
  font-family: 'Rajdhani', sans-serif; font-size: clamp(12px,1.2vw,16px);
  font-weight: 400; color: rgba(255,255,255,0.4); letter-spacing: 1px; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  max-width: 50vw;
}
.tv-meta-row {
  display: flex; align-items: center; gap: clamp(10px,1.5vw,22px); flex-wrap: wrap;
}
.tv-meta-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.tv-meta-label {
  font-size: clamp(7px,0.6vw,9px); letter-spacing: 2px; color: rgba(255,255,255,0.3);
  text-transform: uppercase; font-weight: 600;
}
.tv-meta-value {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(14px,1.4vw,18px);
  letter-spacing: 2px; color: rgba(255,255,255,0.8);
}
.tv-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
.tv-progress-wrap { margin-top: 4px; }
.tv-progress-bar {
  height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
  max-width: 50vw;
}
.tv-progress-fill {
  height: 100%; background: var(--b-color); border-radius: 2px;
  transition: width 0.5s ease;
}
.tv-progress-label {
  font-size: clamp(9px,0.7vw,11px); color: rgba(255,255,255,0.25);
  letter-spacing: 2px; margin-top: 4px; font-weight: 600;
}

/* ═══ TRAILER OVERLAY (fallback for non-screensaver) ═══ */
.trailer-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.92);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.4s ease;
}
.trailer-overlay iframe {
  width: min(90vw, 1200px); height: min(50.625vw, 675px);
  border: none;
}
.trailer-close {
  position: absolute; top: 24px; right: 32px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7); font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 3px; padding: 8px 20px;
  cursor: pointer; text-transform: uppercase;
  transition: all 0.2s;
}
.trailer-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ═══ EMBEDDED TRAILER (screensaver mode) ═══ */
.ss-trailer-container {
  position: absolute;
  left: 50%;
  bottom: 12px;
  aspect-ratio: 16/9;
  max-height: 50vh;
  width: 92vw;
  max-width: calc(50vh * 16 / 9);
  z-index: 15;
  overflow: hidden;
  border-radius: 16px;
  opacity: 0;
  transform: translate(-50%, 100%);
  pointer-events: none;
  transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
              opacity 0.5s ease 0.1s;
}
.ss-trailer-container.has-bottom-banner {
  bottom: 64px;
}
.ss-trailer-container.active {
  transform: translate(-50%, 0);
  opacity: 1;
  pointer-events: auto;
}
.ss-trailer-inner {
  position: relative;
  width: 100%; height: 100%;
  border-radius: 16px;
  overflow: hidden;
}
.ss-trailer-inner iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none; border-radius: 16px;
}
.ss-trailer-close {
  position: absolute;
  top: 12px; right: 16px;
  z-index: 16;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 3px; padding: 6px 16px;
  cursor: pointer; text-transform: uppercase;
  border-radius: 6px;
  backdrop-filter: blur(8px);
  transition: all 0.2s;
}
.ss-trailer-close:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
}

/* ── Screensaver transitions when trailer is active ── */
.ss-wrap.trailer-active .ss-layout {
  transform: translateY(calc(-100vh + 100%));
  align-items: start;
  padding-top: 70px;
  padding-bottom: 10px;
}
.ss-wrap.trailer-active.has-top-banner .ss-layout {
  padding-top: 80px;
}
.ss-wrap.trailer-active .ss-poster-col {
  opacity: 0;
  transform: translateY(-20px) scale(0.9);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.ss-wrap.trailer-active .ss-text-col {
  gap: 6px;
  max-height: calc(50vh - 100px);
  overflow: hidden;
  transition: gap 0.4s ease;
}
.ss-wrap.trailer-active .trailer-pill {
  opacity: 0; max-height: 0; overflow: hidden;
  transition: opacity 0.3s ease, max-height 0.3s ease;
}
.ss-wrap.trailer-active .ss-progress-bar,
.ss-wrap.trailer-active .ss-dot-nav {
  opacity: 0;
  transition: opacity 0.3s ease;
}
.ss-wrap.trailer-active .ss-progress-fill {
  animation-play-state: paused;
}
.ss-wrap.trailer-active .ss-poster-view-img {
  opacity: 0; transform: scale(0.9);
  transition: opacity 0.4s ease, transform 0.5s ease;
}

/* ═══ THEME EFFECTS ═══ */

/* Christmas snowflakes */
.snowflake {
  position: absolute; top: -10px; color: #fff; font-size: 14px;
  opacity: 0.7; pointer-events: none; z-index: 25;
  animation: snowfall linear infinite;
}
@keyframes snowfall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 0.7; }
  100% { transform: translateY(60px) rotate(360deg); opacity: 0; }
}

/* Halloween bats */
.bat {
  position: absolute; top: 8px; font-size: 16px;
  opacity: 0.6; pointer-events: none; z-index: 25;
  animation: batFly linear infinite;
}
@keyframes batFly {
  0% { transform: translateX(-40px) translateY(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateX(calc(100vw + 40px)) translateY(-10px); opacity: 0; }
}

/* ═══ SPORTS — SHARED CARD ═══ */
.sports-atmosphere {
  position: absolute; inset: 0;
  background-size: cover; background-position: center; background-repeat: no-repeat;
}
.sports-atmosphere::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 45%, transparent 20%, rgba(0,0,0,0.7) 100%),
    linear-gradient(180deg, var(--sport-tint, rgba(0,0,0,0.5)) 0%, rgba(0,0,0,0.6) 100%);
}
.sports-atmosphere::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(0,0,0,0.5) 100%);
}
.sports-layout {
  position: absolute; top: 56px; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 20px 40px; z-index: 10;
}
.sports-card {
  position: relative;
  background: rgba(12, 14, 20, 0.6);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 0 80px var(--sport-glow, rgba(255,255,255,0.05)),
              inset 0 1px 0 rgba(255,255,255,0.05);
  padding: clamp(24px,3vw,44px) clamp(28px,4vw,56px);
  max-width: clamp(700px,70vw,920px);
  width: 90%;
  display: flex; flex-direction: column; align-items: center;
  gap: clamp(12px,2vh,22px);
  animation: revealUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
}
@supports not (backdrop-filter: blur(24px)) {
  .sports-card { background: rgba(12,14,20,0.85); }
}
.sports-card-header {
  display: flex; align-items: center; gap: 16px; width: 100%;
  animation: revealUp 0.6s both;
}
.sc-line {
  flex: 1; height: 1px;

  grid-template-columns: 1fr 1fr 1fr; gap: 4px; width: 90px;
}
.base {
  width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.15);
  transform: rotate(45deg); transition: all 0.3s;
}
.base.occupied { background: #f9a825; border-color: #f9a825; box-shadow: 0 0 12px rgba(249,168,37,0.6); }
.base-second { grid-area: second; justify-self: center; }
.base-third { grid-area: third; justify-self: end; }
.base-first { grid-area: first; justify-self: start; }
.base-home { grid-area: home; justify-self: center; width: 22px; height: 22px; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1); clip-path: polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%); }
.mlb-inning-badge {
  background: rgba(249,168,37,0.1); border: 1px solid rgba(249,168,37,0.3);
  padding: 5px 16px; font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(13px,1.3vw,17px); letter-spacing: 4px; color: #f9a825;
  display: flex; align-items: center; gap: 8px; border-radius: 6px;
}
.inning-arrow { font-size: 0.8em; }
.mlb-count { display: flex; gap: 16px; }
.count-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.count-label { font-size: clamp(8px,0.7vw,10px); letter-spacing: 3px; color: rgba(255,255,255,0.25); text-transform: uppercase; font-family: 'Rajdhani', sans-serif; }
.count-dots { display: flex; gap: 4px; }
.count-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); }
.count-dot.on-balls { background: #4ade80; border-color: #4ade80; }
.count-dot.on-strikes { background: #f87171; border-color: #f87171; }
.count-dot.on-outs { background: #facc15; border-color: #facc15; }

/* MLB Linescore Grid */
.mlb-score-grid {
  display: grid; gap: 0; width: 100%; max-width: 600px;
  border: 1px solid rgba(255,255,255,0.08); overflow: hidden; border-radius: 8px;
}
.mlb-sg-cell {
  padding: 5px 8px; text-align: center;
  border-right: 1px solid rgba(255,255,255,0.06);
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(10px,1vw,14px); letter-spacing: 1px;
}
.mlb-sg-cell:last-child { border-right: none; }
.mlb-sg-header { color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.02); font-size: clamp(8px,0.7vw,10px); letter-spacing: 2px; }
.mlb-sg-total { color: #fff; font-weight: 700; background: rgba(255,255,255,0.04); }
.mlb-sg-team { color: rgba(255,255,255,0.6); text-align: left; padding-left: 10px; font-family: 'Bebas Neue', sans-serif; font-size: clamp(11px,1.1vw,15px); letter-spacing: 2px; }
.mlb-sg-score { color: rgba(255,255,255,0.75); }
.mlb-sg-active { color: #f9a825; }
.mlb-sg-dash { color: rgba(255,255,255,0.15); }

/* MLB Batter/Pitcher Matchup */
.mlb-matchup {
  display: flex; align-items: center; gap: clamp(16px,3vw,32px);
  justify-content: center; width: 100%;
}
.mlb-player {
  display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 120px;
}
.mlb-player-headshot {
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid rgba(249,168,37,0.4); object-fit: cover;
  background: rgba(255,255,255,0.05);
}
.mlb-player-label {
  font-family: 'Rajdhani', sans-serif; font-size: clamp(8px,0.7vw,10px);
  letter-spacing: 3px; color: rgba(249,168,37,0.6); text-transform: uppercase;
}
.mlb-player-name {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(14px,1.4vw,20px);
  letter-spacing: 2px; color: rgba(255,255,255,0.9);
}
.mlb-player-detail {
  font-family: 'Rajdhani', sans-serif; font-size: clamp(10px,0.9vw,13px);
  color: rgba(255,255,255,0.35); letter-spacing: 1px;
}
.mlb-player-summary {
  font-family: 'Rajdhani', sans-serif; font-size: clamp(10px,0.9vw,13px);
  color: rgba(255,255,255,0.5); letter-spacing: 1px; text-align: center;
}
.mlb-vs {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(12px,1.2vw,16px);
  letter-spacing: 4px; color: rgba(255,255,255,0.15);
}

/* MLB Info Bar */
.mlb-info-bar {
  display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center;
}
.mlb-info-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 4px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  font-family: 'Rajdhani', sans-serif; font-size: clamp(10px,0.9vw,13px);
  color: rgba(255,255,255,0.45); letter-spacing: 1px;
}
.mlb-info-badge .badge-icon { font-size: 1.1em; }

<body>

<div id="display"></div>
<div id="effects"></div>
<div id="status-light" title="Connected"></div>

<script>
const room = window.location.pathname.split('/room/')[1] || 'theater';
let ws;
let clockInterval;
let currentTheme = 'default';
let trailerTimer = null;
let ytPlayer = null;
let _trailerEmbedded = false;
let _ytProgressInterval = null;
let _lastPayloadHash = null;
let _statusPulseTimer = null;
const BANNER_ASSETS = {
  artdeco: { top: '/assets/banners/artdeco-top.svg', bottom: '/assets/banners/artdeco-bottom.svg' },
  retroneon: { top: '/assets/banners/retroneon-top.svg', bottom: '/assets/banners/retroneon-bottom.svg' },
};
const bannerAssetCache = new Map();

// ── Theme definitions ──
const THEMES = {
  default: {
    color: '#c9a84c',
    glow: 'rgba(201,168,76,0.4)',
    bg: 'linear-gradient(135deg,#1a1200,#0d0a00,#1a1200)',
    effect: null,
  },
  christmas: {
    color: '#d4373e',
    glow: 'rgba(212,55,62,0.4)',
    bg: 'linear-gradient(135deg,#1a0000,#0d0000,#1a0505)',
    effect: 'snow',
  },
  halloween: {
    color: '#ff8c00',
    glow: 'rgba(255,140,0,0.4)',
    bg: 'linear-gradient(135deg,#1a0f00,#0d0800,#1a0f00)',
    effect: 'bats',
  },
  ocean: {
    color: '#00b4d8',
    glow: 'rgba(0,180,216,0.4)',
    bg: 'linear-gradient(135deg,#001219,#000a0d,#001219)',
    effect: null,
  },
  royal: {
    color: '#9b5de5',
    glow: 'rgba(155,93,229,0.4)',
    bg: 'linear-gradient(135deg,#0f0020,#080010,#0f0020)',
    effect: null,
  },
  emerald: {
    color: '#2ec4b6',
    glow: 'rgba(46,196,182,0.4)',
    bg: 'linear-gradient(135deg,#001a16,#000d0b,#001a16)',
    effect: null,
  },
  rose: {
    color: '#e8628c',
    glow: 'rgba(232,98,140,0.4)',
    bg: 'linear-gradient(135deg,#1a0010,#0d0008,#1a0010)',
    effect: null,
  },
  artdeco: {
    color: '#c9a84c',
    glow: 'rgba(201,168,76,0.5)',
    bg: 'linear-gradient(135deg,#1a2744,#0e1a30,#1a2744)',
    effect: 'artdeco',
  },
  retroneon: {
    color: '#ff2d7b',
    glow: 'rgba(255,45,123,0.5)',
    bg: 'linear-gradient(135deg,#1a0a12,#0d0508,#1a0a12)',
    effect: 'retroneon',
  },
};

function applyTheme(name) {
  const theme = THEMES[name] || THEMES.default;
  currentTheme = name;
  document.documentElement.setAttribute('data-theme', name);
  document.documentElement.style.setProperty('--b-color', theme.color);
  document.documentElement.style.setProperty('--b-glow', theme.glow);
  document.documentElement.style.setProperty('--b-bg', theme.bg);

  // Clear existing effects
  const effectsEl = document.getElementById('effects');
  effectsEl.innerHTML = '';

  // Apply effects
  if (theme.effect === 'snow') {
    renderSnowflakes(effectsEl);
  } else if (theme.effect === 'bats') {
    renderBats(effectsEl);
  } else if (theme.effect === 'artdeco' || theme.effect === 'retroneon') {
    applyThemeBanners(theme.effect);
  }
}

function renderSnowflakes(container) {

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function getBannerAsset(path) {
  if (!bannerAssetCache.has(path)) {
    bannerAssetCache.set(path, fetch(path).then(async res => {
      if (!res.ok) throw new Error(`Failed to load ${path}`);
      return res.text();
    }));
  }
  return bannerAssetCache.get(path);
}

async function injectBannerAsset(slot, path) {
  const loadToken = `${path}:${Date.now()}:${Math.random()}`;
  slot.dataset.loadToken = loadToken;
  try {
    const svg = await getBannerAsset(path);
    if (slot.dataset.loadToken !== loadToken) return;
    slot.innerHTML = svg;
  } catch (err) {
    if (slot.dataset.loadToken !== loadToken) return;
    slot.innerHTML = '';
    console.error(err);
  }
}

function renderSvgBanner(banner, themeName, text, isBottom) {
  const assetPath = BANNER_ASSETS[themeName]?.[isBottom ? 'bottom' : 'top'];
  if (!assetPath) return;
  const safeText = escapeHtml(text);
  banner.dataset.bannerTheme = themeName;
  banner.classList.add('banner-themed', isBottom ? 'is-bottom' : 'is-top');
  banner.innerHTML = `
    <div class="banner-stage">
      <div class="banner-asset-slot" aria-hidden="true"></div>
      <div class="banner-label-wrap">
        <span class="banner-text banner-label" data-text="${safeText}">${safeText}</span>
      </div>
    </div>
  `;
  const slot = banner.querySelector('.banner-asset-slot');
  injectBannerAsset(slot, assetPath);
}

function applyThemeBanners(effect) {
  document.querySelectorAll('.banner').forEach(banner => {
    const text = banner.querySelector('.banner-text')?.textContent || '';
    renderSvgBanner(banner, effect, text, false);
  });
  document.querySelectorAll('.banner-bottom').forEach(banner => {
    const text = banner.querySelector('.banner-text')?.textContent || '';
    renderSvgBanner(banner, effect, text, true);
  });
}

function payloadHash(state) {
  // Build a lightweight fingerprint of the fields that affect rendering
  const s = state;
  return [s.mode, s.title, s.subtitle, s.slideIndex, s.theme, s.bannerText,
    s.homeTeam?.score, s.awayTeam?.score, s.status, s.clock, s.period, s.periodText,
    s.posterUrl, s.backdropUrl, s.year, s.overview, s.rating,
    s.screensaverView, s.showTopBanner, s.showBottomBanner, s.bottomBannerText,
  ].join('|');
}

function pulseStatusLight() {
  const light = document.getElementById('status-light');
  if (!light) return;
  light.className = 'pulse';
  clearTimeout(_statusPulseTimer);
  _statusPulseTimer = setTimeout(() => { light.className = 'connected'; }, 600);
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  const light = document.getElementById('status-light');

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', room }));
    if (light) light.className = 'connected';
  };

  ws.onmessage = (e) => {
    try {
      const state = JSON.parse(e.data);
      pulseStatusLight();
      // Skip re-render if nothing meaningful changed
      const hash = payloadHash(state);
      if (hash === _lastPayloadHash) return;
      _lastPayloadHash = hash;
      render(state);
    } catch (err) {
      console.error('[ws] Bad message:', err);
    }
  };

  ws.onclose = () => {
    if (light) light.className = 'disconnected';
    _lastPayloadHash = null; // Force re-render on reconnect
    setTimeout(connectWS, 3000);
  };
}

function render(state) {
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  if (_ytProgressInterval) { clearInterval(_ytProgressInterval); _ytProgressInterval = null; }
  if (trailerTimer) { clearTimeout(trailerTimer); trailerTimer = null; }
  // Don't close trailer on screensaver slide advances — only close on mode change
  const trailerActive = document.getElementById('trailer-overlay') ||
    document.querySelector('.ss-trailer-container.active');
  if (trailerActive && state.mode === 'screensaver') {
    return; // Skip re-render entirely while trailer is playing over screensaver
  }
  closeTrailer();

  // Apply theme from state
  if (state.theme && state.theme !== currentTheme) {
    applyTheme(state.theme);
  }

  if (state.mode === 'nowplaying') {
    renderNowPlaying(state);
  } else if (state.mode === 'nowplaying-tv') {
    renderNowPlayingTV(state);
  } else if (state.mode === 'sports-soccer') {
    renderSportsSoccer(state);
  } else if (state.mode === 'sports-nfl') {
    renderSportsNFL(state);
  } else if (state.mode === 'sports-nba') {
    renderSportsNBA(state);
  } else if (state.mode === 'sports-ufc') {
    renderSportsUFC(state);
  } else if (state.mode === 'sports-mlb') {
    renderSportsMLB(state);
  } else if (state.mode === 'sports-nhl') {
    renderSportsNHL(state);
  } else if (state.mode === 'youtube') {
    renderYouTube(state);
  } else if (state.mode === 'app') {
    renderApp(state);
  } else {
    renderScreensaver(state);
  }

  // Re-apply effects after render (banner was re-created)
  const theme = THEMES[currentTheme] || THEMES.default;
  if (theme.effect === 'snow') {
    renderSnowflakes(document.getElementById('effects'));
  } else if (theme.effect === 'bats') {
    renderBats(document.getElementById('effects'));
  } else if (theme.effect === 'artdeco' || theme.effect === 'retroneon') {
    applyThemeBanners(theme.effect);
  }
}

function buildStars(rating) {
  if (!rating) return '';
  const full = Math.floor(rating);
  const remainder = rating - full;
  const half = remainder >= 0.3 ? 1 : 0;
  const empty = 5 - full - half;
  let html = '';
  for (let i = 0; i < full; i++) html += '<span class="star s-full">★</span>';
  if (half) html += '<span class="star s-half">★</span>';
  for (let i = 0; i < empty; i++) html += '<span class="star s-empty">★</span>';
  return html;
}

function formatTime() {
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}

function openTrailer(youtubeKey) {
  console.log('[trailer] openTrailer called with key:', youtubeKey);
  closeTrailer();
  // Tell server to pause screensaver rotation while trailer plays
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'trailer-start', room }));
  }

  // Try embedded mode (screensaver has the container in the DOM)
  const container = document.getElementById('ss-trailer-container');
  const inner = document.getElementById('ss-trailer-inner');
  const ssWrap = document.querySelector('.ss-wrap');

  if (container && inner && ssWrap) {
    // Embedded trailer inside screensaver layout
    _trailerEmbedded = true;
    ssWrap.classList.add('trailer-active');
    if (ssWrap.querySelector('.banner')) ssWrap.classList.add('has-top-banner');
    requestAnimationFrame(() => {
      container.classList.add('active');
    });
    const playerDiv = document.createElement('div');
    playerDiv.id = 'yt-player';
    inner.innerHTML = '';
    inner.appendChild(playerDiv);
    ytPlayer = new YT.Player('yt-player', {
      width: '100%',
      height: '100%',
      videoId: youtubeKey,
      playerVars: { autoplay: 1, mute: 1, rel: 0, modestbranding: 1 },
      events: {
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.ENDED) closeTrailer();
        }
      }
    });
  } else {
    // Fallback: overlay mode for non-screensaver contexts
    const overlay = document.createElement('div');
    overlay.className = 'trailer-overlay';
    overlay.id = 'trailer-overlay';
    overlay.innerHTML = `
      <div id="yt-player"></div>
      <button class="trailer-close" onclick="closeTrailer()">Close</button>
    `;
    document.body.appendChild(overlay);
    ytPlayer = new YT.Player('yt-player', {
      videoId: youtubeKey,
      playerVars: { autoplay: 1, mute: 1, rel: 0, modestbranding: 1 },
      events: {
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.ENDED) closeTrailer();
        }
      }
    });
  }
}

function closeTrailer() {
  const wasPlaying = !!ytPlayer || _trailerEmbedded || !!document.getElementById('trailer-overlay');
  if (ytPlayer) { ytPlayer.destroy(); ytPlayer = null; }

  // Clean up embedded trailer only if one was actually open
  if (_trailerEmbedded) {
    _trailerEmbedded = false;
    const container = document.getElementById('ss-trailer-container');
    const ssWrap = document.querySelector('.ss-wrap');
    if (container) container.classList.remove('active');
    if (ssWrap) {
      ssWrap.classList.remove('trailer-active');
      ssWrap.classList.remove('has-top-banner');
    }
    const inner = document.getElementById('ss-trailer-inner');
    if (inner) setTimeout(() => { inner.innerHTML = ''; }, 700);
  }

  // Clean up overlay fallback
  const existing = document.getElementById('trailer-overlay');
  if (existing) existing.remove();

  // Only notify server if a trailer was actually playing
  if (wasPlaying && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'trailer-end', room }));
  }
}

function scheduleTrailer(key, mode, delay) {
  console.log('[trailer] scheduleTrailer called — key:', key, 'mode:', mode, 'delay:', delay);
  if (!key || mode === 'off' || !mode) { console.log('[trailer] scheduleTrailer skipped (no key or mode off)'); return; }
  const seconds = (delay && delay >= 5) ? delay : 30;
  console.log('[trailer] scheduling auto-play in', seconds, 'seconds');
  trailerTimer = setTimeout(() => openTrailer(key), seconds * 1000);
}

              </div>` : ''}
            </div>` : ''}
            ${goals.length ? `<div class="soccer-recent-goals">
              ${goals.map(g => `<div class="goal-event"><div class="goal-icon">⚽</div><div class="goal-text">${g.player}</div><div class="goal-min">${g.minute}</div></div>`).join('')}

            ${cards.length ? `<div class="soccer-cards">
              ${cards.map(c => `<div class="card-event"><div class="card-icon">${c.type === 'red' ? '🟥' : '🟨'}</div><div class="card-text">${c.player}</div><div class="card-min ${c.type}">${c.minute}</div></div>`).join('')}

          </div>` : ''}
          ${venueText ? `<div class="sports-venue">${venueText}</div>` : ''}
          ${buildInfoBarHtml(s)}
        </div>
      </div>
    </div>
  `;
}

  document.documentElement.style.setProperty('--b-bg', 'linear-gradient(135deg,#1a1000,#0d0800,#1a1000)');
  document.documentElement.style.setProperty('--sport-accent', '#f9a825');
  document.documentElement.style.setProperty('--sport-accent-dim', 'rgba(249,168,37,0.15)');
  document.documentElement.style.setProperty('--sport-glow', 'rgba(249,168,37,0.1)');

  const inningText = s.inning ? `${s.isTop ? 'Top' : 'Bot'} ${s.inning}${['st','nd','rd'][s.inning-1]||'th'}` : s.periodText || '';
  const inningArrow = s.isTop ? '▲' : '▼';
  const statusText = s.isLive ? 'LIVE GAME' : (s.status === 'post' ? 'FINAL' : 'GAME');

  function dots(count, max, cls) {
    let h = '';
    for (let i = 0; i < max; i++) h += `<div class="count-dot${i < count ? ' ' + cls : ''}"></div>`;
    return h;
  }

  // Build linescore grid
  const totalInnings = Math.max(9, iScores.home.length, iScores.away.length);
  const currentInning = s.inning || 0;
  let gridCols = `auto repeat(${totalInnings}, 1fr) auto auto auto`;
  let gridHtml = '';
  // Header row
  gridHtml += `<div class="mlb-sg-cell mlb-sg-header mlb-sg-team"></div>`;
  for (let i = 1; i <= totalInnings; i++) {
    const isActive = s.isLive && i === currentInning;
    gridHtml += `<div class="mlb-sg-cell mlb-sg-header${isActive ? ' mlb-sg-active' : ''}">${i}</div>`;
  }
  gridHtml += `<div class="mlb-sg-cell mlb-sg-header mlb-sg-total">R</div>`;
  gridHtml += `<div class="mlb-sg-cell mlb-sg-header mlb-sg-total">H</div>`;
  gridHtml += `<div class="mlb-sg-cell mlb-sg-header mlb-sg-total">E</div>`;
  // Away row (away bats first)
  gridHtml += `<div class="mlb-sg-cell mlb-sg-team">${away.abbreviation || 'AWAY'}</div>`;
  for (let i = 0; i < totalInnings; i++) {
    const val = i < iScores.away.length ? iScores.away[i] : '';
    const isActive = s.isLive && (i + 1) === currentInning && s.isTop;
    const dash = val === '' ? '<span class="mlb-sg-dash">-</span>' : val;
    gridHtml += `<div class="mlb-sg-cell mlb-sg-score${isActive ? ' mlb-sg-active' : ''}">${dash}</div>`;
  }
  gridHtml += `<div class="mlb-sg-cell mlb-sg-total">${away.score || 0}</div>`;
  gridHtml += `<div class="mlb-sg-cell mlb-sg-total">${tStats.away.H || '-'}</div>`;
  gridHtml += `<div class="mlb-sg-cell mlb-sg-total">${tStats.away.E || '-'}</div>`;
  // Home row
  gridHtml += `<div class="mlb-sg-cell mlb-sg-team">${home.abbreviation || 'HOME'}</div>`;
  for (let i = 0; i < totalInnings; i++) {
    const val = i < iScores.home.length ? iScores.home[i] : '';
    const isActive = s.isLive && (i + 1) === currentInning && !s.isTop;
    const dash = val === '' ? '<span class="mlb-sg-dash">-</span>' : val;
    gridHtml += `<div class="mlb-sg-cell mlb-sg-score${isActive ? ' mlb-sg-active' : ''}">${dash}</div>`;
  }
  gridHtml += `<div class="mlb-sg-cell mlb-sg-total">${home.score || 0}</div>`;
  gridHtml += `<div class="mlb-sg-cell mlb-sg-total">${tStats.home.H || '-'}</div>`;
  gridHtml += `<div class="mlb-sg-cell mlb-sg-total">${tStats.home.E || '-'}</div>`;

  // Batter/Pitcher matchup (only if we have names)
  const hasBatter = batter.name;
  const hasPitcher = pitcher.name;
  const matchupHtml = (hasBatter || hasPitcher) ? `
    <div class="mlb-matchup">
      ${hasBatter ? `<div class="mlb-player">
        <div class="mlb-player-label">AT BAT</div>
        ${batter.headshot ? `<img class="mlb-player-headshot" src="${batter.headshot}" onerror="this.style.display='none'">` : ''}
        <div class="mlb-player-name">${batter.shortName || batter.name}</div>
        ${batter.jersey || batter.position ? `<div class="mlb-player-detail">#${batter.jersey || ''} ${batter.position || ''}</div>` : ''}
        ${batter.summary ? `<div class="mlb-player-summary">${batter.summary}</div>` : ''}
      </div>` : ''}
      <div class="mlb-vs">VS</div>
      ${hasPitcher ? `<div class="mlb-player">
        <div class="mlb-player-label">PITCHING</div>
        ${pitcher.headshot ? `<img class="mlb-player-headshot" src="${pitcher.headshot}" onerror="this.style.display='none'">` : ''}
        <div class="mlb-player-name">${pitcher.shortName || pitcher.name}</div>
        ${pitcher.jersey || pitcher.position ? `<div class="mlb-player-detail">#${pitcher.jersey || ''} ${pitcher.position || ''}</div>` : ''}
        ${pitcher.summary ? `<div class="mlb-player-summary">${pitcher.summary}</div>` : ''}
      </div>` : ''}
    </div>` : '';

  // Venue line
  const venueText = [s.venue, s.venueCity, s.venueState].filter(Boolean).join(' · ');

  // Info bar (conditional badges)
  let infoBadges = '';
  if (s.weather) {
    infoBadges += `<div class="mlb-info-badge"><span class="badge-icon">🌡</span>${s.weather.temperature}°F ${s.weather.displayValue}</div>`;
  }
  if (s.odds) {
    infoBadges += `<div class="mlb-info-badge"><span class="badge-icon">📊</span>${s.odds.details || ''}</div>`;
  }
  if (s.tickets && s.tickets.summary) {
    infoBadges += `<div class="mlb-info-badge"><span class="badge-icon">🎟</span>${s.tickets.summary}</div>`;
  }
  if (s.notes && s.notes.length) {
    for (const note of s.notes) {
      infoBadges += `<div class="mlb-info-badge">${note}</div>`;
    }
  }
  const infoBarHtml = infoBadges ? `<div class="mlb-info-bar">${infoBadges}</div>` : '';

  el.innerHTML = `
    <div class="np-wrap" style="background:#000">
      <div class="sports-atmosphere mlb-atmosphere"></div>
      <div class="banner">
        <span class="banner-orn" style="color:#f9a825">◇ ── ◇</span>
        <span class="banner-text" style="color:#f9a825">${bannerText}</span>
        <span class="banner-orn" style="color:#f9a825">◇ ── ◇</span>
      </div>
      <div class="sports-layout">
        <div class="sports-card">
          <div class="sports-card-header">
            <div class="sc-line"></div>
            <span>${statusText}</span>
            <div class="sc-line"></div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            ${s.isLive ? '<div class="live-indicator"><div class="live-pulse"></div>LIVE</div>' : ''}
            ${s.inning ? `<div class="mlb-inning-badge"><span class="inning-arrow">${inningArrow}</span>${inningText}</div>` : ''}
            ${s.league && s.league !== 'MLB' ? `<span class="sports-venue">${s.league}</span>` : ''}
          </div>
          <div class="sports-scoreboard">
            <div class="sports-team">
              <div class="sports-logo mlb-home">${home.logo ? `<img src="${home.logo}" onerror="this.outerHTML='🧢'">` : '🧢'}</div>
              <div class="sports-team-name">${home.name || 'Home'}</div>
              <div class="sports-team-record">${home.record || ''}</div>
            </div>
            <div class="sports-score-center">
              <div class="sports-score"><span>${home.score || 0}</span><span class="sports-score-dash">–</span><span>${away.score || 0}</span></div>
            </div>
            <div class="sports-team">
              <div class="sports-logo mlb-away">${away.logo ? `<img src="${away.logo}" onerror="this.outerHTML='🔴'">` : '🔴'}</div>
              <div class="sports-team-name">${away.name || 'Away'}</div>
              <div class="sports-team-record">${away.record || ''}</div>
            </div>
          </div>
          <div class="mlb-score-grid" style="grid-template-columns:${gridCols}">${gridHtml}</div>
          ${s.isLive ? `<div class="sports-stats-footer">
            <div style="display:flex;align-items:center;gap:clamp(20px,4vw,40px)">
              <div class="mlb-diamond">
                <div></div><div class="base base-second${bases.second ? ' occupied' : ''}"></div><div></div>
                <div class="base base-third${bases.third ? ' occupied' : ''}"></div><div></div><div class="base base-first${bases.first ? ' occupied' : ''}"></div>
                <div></div><div class="base-home"></div><div></div>
              </div>
              <div class="mlb-count">
                <div class="count-group"><div class="count-label">Balls</div><div class="count-dots">${dots(count.balls||0, 4, 'on-balls')}</div></div>
                <div class="count-group"><div class="count-label">Strikes</div><div class="count-dots">${dots(count.strikes||0, 3, 'on-strikes')}</div></div>
                <div class="count-group"><div class="count-label">Outs</div><div class="count-dots">${dots(count.outs||0, 3, 'on-outs')}</div></div>
              </div>
            </div>
          </div>` : ''}
          ${matchupHtml}
          ${venueText ? `<div class="sports-venue">${venueText}</div>` : ''}
          ${infoBarHtml}
        </div>
      </div>
    </div>
  `;
}

// ── YouTube mode ──
function formatDuration(seconds) {
  if (!seconds) return '--:--';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s2 = Math.floor(seconds % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s2).padStart(2,'0')}`;
  return `${m}:${String(s2).padStart(2,'0')}`;
}

function renderYouTube(s) {
  if (_ytProgressInterval) { clearInterval(_ytProgressInterval); _ytProgressInterval = null; }

  const el = document.getElementById('display');
  const bannerText = s.bannerText || 'Watching Now';
  const hasMetadata = s.mediaTitle;
  const initials = s.mediaArtist ? s.mediaArtist.split(/\s+/).map(w => w[0]).join('').substring(0,2).toUpperCase() : 'YT';

  // Override theme colors for YouTube
  document.documentElement.style.setProperty('--b-color', '#ff4444');
  document.documentElement.style.setProperty('--b-glow', 'rgba(255,68,68,0.4)');
  document.documentElement.style.setProperty('--b-bg', 'linear-gradient(135deg,#1a0000,#0d0000,#1a0000)');

  if (!hasMetadata) {
    el.innerHTML = `
      <div class="yt-wrap">
        <div class="yt-scan"></div>
        <div class="banner">
          <span class="banner-orn">✦ ── ✦</span>
          <span class="banner-text">${bannerText}</span>
          <span class="banner-orn">✦ ── ✦</span>
        </div>
        <div class="yt-layout">
          <div class="yt-logo-wrap">
            <div class="yt-logo-icon"><svg viewBox="0 0 24 24"><polygon points="10,8 16,12 10,16"/></svg></div>
            <div class="yt-logo-text">YouTube</div>
          </div>
          <div class="yt-video-title" style="color:rgba(255,255,255,0.4)">${bannerText}</div>
          <div class="app-clock" id="live-clock">${formatTime()}</div>
        </div>
      </div>
    `;
    clockInterval = setInterval(() => {
      const c = document.getElementById('live-clock');
      if (c) c.textContent = formatTime();
    }, 1000);
    return;
  }

  let position = s.mediaPosition || 0;
  const duration = s.mediaDuration || 0;
  const pct = duration > 0 ? Math.min((position / duration) * 100, 100) : 0;

  el.innerHTML = `
    <div class="yt-wrap">
      <div class="yt-scan"></div>
      <div class="banner">
        <span class="banner-orn">✦ ── ✦</span>
        <span class="banner-text">${bannerText}</span>
        <span class="banner-orn">✦ ── ✦</span>
      </div>
      <div class="yt-layout">
        <div class="yt-logo-wrap">
          <div class="yt-logo-icon"><svg viewBox="0 0 24 24"><polygon points="10,8 16,12 10,16"/></svg></div>
          <div class="yt-logo-text">YouTube</div>
        </div>
        <div class="yt-video-title">${s.mediaTitle}</div>
        ${s.mediaArtist ? `
          <div class="yt-channel">
            <div class="yt-channel-avatar">${initials}</div>
            <div class="yt-channel-name">${s.mediaArtist}</div>
          </div>
        ` : ''}
        <div class="yt-stats">
          ${duration ? `<div class="yt-stat">${formatDuration(duration)}</div><div class="yt-stat-divider"></div>` : ''}
          <div class="yt-stat" id="live-clock">${formatTime()}</div>
        </div>
        ${duration ? `
          <div class="yt-progress-wrap">
            <div class="yt-progress-bar">
              <div class="yt-progress-fill" id="yt-fill" style="width:${pct}%">
                <div class="yt-progress-thumb"></div>
              </div>
            </div>
            <div class="yt-progress-times">
              <span id="yt-pos">${formatDuration(position)}</span>
              <span>${formatDuration(duration)}</span>
            </div>
          </div>
        ` : ''}
      </div>
    </div>
  `;

  clockInterval = setInterval(() => {
    const c = document.getElementById('live-clock');
    if (c) c.textContent = formatTime();
  }, 1000);

  if (duration > 0) {
    _ytProgressInterval = setInterval(() => {
      position++;
      if (position > duration) position = duration;
      const fill = document.getElementById('yt-fill');
      const posEl = document.getElementById('yt-pos');
      if (fill) fill.style.width = Math.min((position / duration) * 100, 100) + '%';
      if (posEl) posEl.textContent = formatDuration(position);
    }, 1000);
  }
}

// ── App mode ──
function getAppIcon(appName) {
  const name = (appName || '').toLowerCase();
  const icons = {
    netflix: '🎬', 'disney+': '🏰', 'disney plus': '🏰',
    hbo: '🎭', 'hbo max': '🎭', 'max': '🎭',
    'prime video': '📦', 'amazon prime': '📦',
    spotify: '🎵', 'apple music': '🎵', 'tidal': '🎵',
    twitch: '🎮', 'apple tv': '📺', 'apple tv+': '📺',
    hulu: '📗', peacock: '🦚', paramount: '⛰️', 'paramount+': '⛰️',
    crunchyroll: '🍥', funimation: '🍥',
    vlc: '🔶', kodi: '📺', jellyfin: '📺', emby: '📺',
  };
  for (const [key, icon] of Object.entries(icons)) {
    if (name.includes(key)) return icon;
  }
  return '📱';
}

  const genres = (s.genres || []).map(g => `<div class="ss-genre-pill">${g}</div>`).join('');

  const showRuntime = elems.includes('runtime');

  const showContentRating = elems.includes('contentRating');
  const showOverview = elems.includes('overview');
  const showCredits = elems.includes('credits');

  // Source label
  const sourceLabel = s.sourceLabel || 'Featured';

  // Banner text: server sends source-based text for screensaver mode
  const ssBannerText = s.bannerText || 'Marquee';

  // Ken Burns variation based on slide index
  const slideIndex = s.slideIndex || 0;
  const kenBurnsAnim = `ssKenBurns${(slideIndex % 3) + 1}`;

  // Dynamic dot navigation
  const maxDots = 10;
  const slideCount = Math.min(s.slideCount || 1, maxDots);
  const activeDot = slideIndex % maxDots;
  let dotsHtml = '';
  for (let i = 0; i < slideCount; i++) {
    dotsHtml += `<div class="ss-dot${i === activeDot ? ' active' : ''}"></div>`;
  }

  // Progress bar duration
  const interval = s.screensaverInterval || 15;

  // Subtitle for TV shows
  const subtitleHtml = s.subtitle ? `<div class="ss-subtitle">${s.subtitle}</div>` : '';

  // Crossfade: only apply fade transition when the title actually changes
  const existing = el.querySelector('.ss-wrap');
  const prevTitle = existing?.querySelector('.ss-title')?.textContent;
  if (existing && prevTitle && prevTitle !== (s.title || '')) {
    existing.classList.add('ss-fade-out');
    setTimeout(() => {
      renderScreensaverContent();
    }, 400);
  } else {
    renderScreensaverContent();
  }

  function renderScreensaverContent() {
    const ssView = s.screensaverView || 'default';
    const showTop = s.showTopBanner !== false;
    const showBottom = s.showBottomBanner || false;
    const bottomText = s.bottomBannerText || '';
    const bottomCls = showBottom ? ' has-bottom-banner' : '';

    const topBannerHtml = showTop ? `
        <div class="banner">
          <span class="banner-orn">✦ ── ✦</span>
          <span class="banner-text">${ssBannerText}</span>
          <span class="banner-orn">✦ ── ✦</span>
        </div>` : '';

    const bottomBannerHtml = showBottom ? `
        <div class="banner-bottom">
          <span class="banner-orn">✦ ── ✦</span>
          <span class="banner-text">${bottomText}</span>
          <span class="banner-orn">✦ ── ✦</span>
        </div>` : '';

    const progressHtml = `<div class="ss-progress-bar${bottomCls}"><div class="ss-progress-fill" style="animation-duration:${interval}s"></div></div>`;
    const dotsNavHtml = `<div class="ss-dot-nav${bottomCls}">${dotsHtml}</div>`;

    if (ssView === 'poster') {
      const posterCls = `ss-poster-view${showTop ? ' has-top-banner' : ''}${showBottom ? ' has-bottom-banner' : ''}`;
      el.innerHTML = `
        <div class="ss-wrap ss-fade-in">
          ${topBannerHtml}
          <div class="${posterCls}">
            ${s.posterUrl ? `<img class="ss-poster-view-img" src="${s.posterUrlHd || s.posterUrl}" alt="${s.title || ''}" onerror="this.onerror=null;this.src='/assets/placeholder.png'">` : ''}
          </div>
          <div class="ss-trailer-container${bottomCls}" id="ss-trailer-container">
            <div class="ss-trailer-inner" id="ss-trailer-inner"></div>
            <button class="ss-trailer-close" onclick="closeTrailer()">CLOSE</button>
          </div>
          ${bottomBannerHtml}
          ${progressHtml}
          ${dotsNavHtml}
        </div>
      `;
    } else {
      el.innerHTML = `
        <div class="ss-wrap ss-fade-in">
          <div class="ss-bg-img" style="background-image:url('${bgImage}'); animation: ${kenBurnsAnim} 20s ease-in-out infinite alternate;"></div>
          <div class="ss-vignette"></div>
          <div class="ss-bottom-grad"></div>
          ${topBannerHtml}
          <div class="ss-layout">
            <div class="ss-text-col">
              <div class="ss-source-label">${sourceLabel}</div>
              <div class="ss-title">${s.title || ''}</div>
              ${subtitleHtml}
              <div class="ss-meta-row">
                ${s.year ? `<div class="ss-year">${s.year}</div>` : ''}
                ${genres}
              </div>
              ${s.tagline ? `<div class="ss-tagline">${s.tagline}</div>` : ''}
              ${(showContentRating && s.contentRating) || (showRating && s.rating) || (showRuntime && s.runtime) ? `
              <div class="ss-badges">
                ${showContentRating && s.contentRating ? `<div class="b-rating">${s.contentRating}${s.contentRatingDesc ? `<small>${s.contentRatingDesc}</small>` : ''}</div>` : ''}
                ${showRating && s.rating ? `<div class="b-stars">${buildStars(s.rating)}</div>` : ''}
                ${showRuntime && s.runtime ? `<div class="ss-runtime">${s.runtime}</div>` : ''}
              </div>` : ''}
              ${showOverview && s.overview ? `<div class="ss-overview">${s.overview}</div>` : ''}
              ${showCredits && (s.director || (s.cast && s.cast.length)) ? `<div class="ss-credits">${s.director ? 'Directed by ' + s.director : ''}${s.director && s.cast && s.cast.length ? ' · ' : ''}${s.cast && s.cast.length ? s.cast.join(', ') : ''}</div>` : ''}
              ${s.trailerKey && (s.source === 'coming_soon' || s.source === 'trending') ? `<div class="trailer-pill">▶</div>` : ''}
            </div>
            ${s.posterUrl ? `<div class="ss-poster-col"><img class="ss-poster-img" src="${s.posterUrl}" alt="${s.title || ''}" onerror="this.onerror=null;this.src='/assets/placeholder.png'"></div>` : ''}
          </div>
          <div class="ss-trailer-container${bottomCls}" id="ss-trailer-container">
            <div class="ss-trailer-inner" id="ss-trailer-inner"></div>
            <button class="ss-trailer-close" onclick="closeTrailer()">CLOSE</button>
          </div>
          ${bottomBannerHtml}
          ${progressHtml}
          ${dotsNavHtml}
        </div>
      `;
    }

    // Wire trailer pill click + auto-play for Coming Soon slides
    if (s.trailerKey && (s.source === 'coming_soon' || s.source === 'trending')) {
      const pill = el.querySelector('.trailer-pill');
      if (pill) {
        pill.addEventListener('click', () => openTrailer(s.trailerKey));
      }
      scheduleTrailer(s.trailerKey, s.trailerMode, s.trailerDelay);
    }
  }
}

// Set page title
document.title = `Marquee — ${room.replace(/-/g, ' ')}`;

// Auto-hide cursor after 2s of inactivity
(function() {
  let cursorTimer;
  document.body.classList.add('cursor-hidden');
  document.addEventListener('mousemove', () => {
    document.body.classList.remove('cursor-hidden');
    clearTimeout(cursorTimer);
    cursorTimer = setTimeout(() => document.body.classList.add('cursor-hidden'), 2000);
  });
})();

// Connect
connectWS();
</script>
</body>
</html>
