<!-- @dsCard group="Live Match" -->
<!--
  Marquee Live Match — design harness / canvas.
  This mirrors the real theater display: a 1920x1080 dark cinematic screen, the live-match
  scoreboard card centered below, and an EMPTY top-banner slot (#lm-banner-slot) at the very top.

  YOUR JOB: design the banner that fills #lm-banner-slot. Build it as a single
  <div class="lm-banner"> + scoped <style>, then drop it into the slot here to preview it
  in context. The mock payload below (window.MATCH) is the data your banner binds to — see
  data-contract.json for the full field list. Toggle MATCH between the pre/live/post states to test.

  Do NOT restyle the card or page — only design the banner.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquee — Live Match Banner Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Bebas+Neue&family=Black+Ops+One&family=Teko:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ---- Host page (do not redesign) ---- */
  :root {
    --b-color: #4ade80;                /* live-soccer accent the real app sets */
    --b-glow: rgba(74,222,128,0.4);
    --b-bg: linear-gradient(135deg,#001a08,#000d04,#001a08);
    --home-color: #1a3a6b;             /* injected per-match */
    --away-color: #cf142b;
    --sport-accent: #4ade80;
    --sport-glow: rgba(74,222,128,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Rajdhani', sans-serif;
    background: #05070b;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  /* Fixed 16:9 stage so the banner is designed at true display proportions. */
  .stage {
    position: relative;
    width: 1920px; height: 1080px;
    max-width: 100vw; max-height: 100vh;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background:
      radial-gradient(ellipse 70% 60% at 50% 42%, transparent 18%, rgba(0,0,0,0.72) 100%),
      linear-gradient(180deg, rgba(0,18,8,0.55) 0%, rgba(0,0,0,0.62) 100%),
      #0a0e14;
    transform-origin: center;
  }

  /* ---- BANNER SLOT — your design goes here ---- */
  #lm-banner-slot {
    position: absolute; top: 0; left: 0; right: 0; z-index: 20;
    min-height: clamp(64px, 8vh, 120px);
  }
  /* Placeholder shown until you drop your .lm-banner markup in. Delete when designing. */
  #lm-banner-slot:empty::after {
    content: 'YOUR BANNER GOES HERE  —  full width · height clamp(64px, 8vh, 120px)';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani'; letter-spacing: 4px; font-size: 18px;
    color: rgba(255,255,255,0.35);
    border: 1px dashed rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.02);
  }

  /* ---- Mock scoreboard card (context only — matches the real app, do not redesign) ---- */
  .stage-card-wrap {
    position: absolute; top: 130px; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; padding: 40px;
  }
  .card {
    background: rgba(12,14,20,0.6);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-radius: 24px; border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 0 80px var(--sport-glow);
    padding: 44px 56px; width: 70%; max-width: 920px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }
  .card .status { font-family:'Teko'; letter-spacing:4px; color:var(--sport-accent); font-size:22px; }
  .card .board { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:60px; width:100%; }
  .card .team { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .card .crest { width:120px; height:120px; border-radius:50%; border:1px solid rgba(255,255,255,0.1);
                 display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.03); }
  .card .crest img { width:80%; height:80%; object-fit:contain; }
  .card .tname { font-family:'Bebas Neue'; font-size:30px; letter-spacing:1px; }
  .card .score { font-family:'Bebas Neue'; font-size:140px; line-height:1; letter-spacing:-4px;
                 display:flex; gap:18px; text-shadow:0 0 80px var(--sport-glow); }
  .card .stats { display:flex; gap:40px; width:100%; max-width:600px; margin-top:8px; }
  .card .stat { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;
                font-family:'Rajdhani'; font-size:13px; letter-spacing:2px; color:rgba(255,255,255,0.7); }
  .card .bar { width:100%; height:2px; background:rgba(255,255,255,0.08); position:relative; }
  .card .bar i { position:absolute; top:0; left:0; height:100%; background:var(--sport-accent); }
</style>
</head>
<body>
  <div class="stage">

    <!-- Design target -->
    <div id="lm-banner-slot"><!-- paste your <div class="lm-banner">…</div> here --></div>

    <!-- Context card (do not redesign) -->
    <div class="stage-card-wrap">
      <div class="card">
        <div class="status">● LIVE GAME · 67' · FIFA WORLD CUP</div>
        <div class="board">
          <div class="team">
            <div class="crest"><img src="https://a.espncdn.com/i/teamlogos/countries/500/usa.png" alt="USA"></div>
            <div class="tname">United States</div>
          </div>
          <div class="score"><span>2</span><span style="opacity:.4">-</span><span>1</span></div>
          <div class="team">
            <div class="crest"><img src="https://a.espncdn.com/i/teamlogos/countries/500/eng.png" alt="ENG"></div>
            <div class="tname">England</div>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><span>POSSESSION</span><div class="bar"><i style="width:58%"></i></div><span>58% — 42%</span></div>
          <div class="stat"><span>SHOTS</span><div class="bar"><i style="width:60%"></i></div><span>14 — 10</span></div>
          <div class="stat"><span>ON TARGET</span><div class="bar"><i style="width:60%"></i></div><span>6 — 4</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // The live-match payload your banner binds to. Mirror of data-contract.json.
    // Switch `state` to 'pre' | 'live' | 'post' to preview each match state.
    window.MATCH = {
      state: 'live',
      isLive: true, status: 'in', clock: '67', periodText: '2nd Half',
      league: 'FIFA World Cup',
      leagueLogo: 'https://a.espncdn.com/i/leaguelogos/soccer/500-dark/2310.png',
      round: 'Round of 16',
      venue: 'MetLife Stadium', venueCity: 'East Rutherford',
      homeTeam: { name:'United States', abbreviation:'USA', logo:'https://a.espncdn.com/i/teamlogos/countries/500/usa.png', score:2, color:'#1a3a6b' },
      awayTeam: { name:'England',       abbreviation:'ENG', logo:'https://a.espncdn.com/i/teamlogos/countries/500/eng.png', score:1, color:'#cf142b' },
      winProb: { home:52, draw:28, away:20 }
    };
    document.documentElement.style.setProperty('--home-color', window.MATCH.homeTeam.color);
    document.documentElement.style.setProperty('--away-color', window.MATCH.awayTeam.color);
  </script>
</body>
</html>
